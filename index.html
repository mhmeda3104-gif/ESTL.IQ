<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #ffffff; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }

<body>

    <nav class="fixed w-full z-50 glass py-4 px-6 flex justify-between items-center">

        <div class="hidden md:flex gap-8 text-sm uppercase tracking-widest">

        </div>
        <div class="glass p-4 rounded-lg group">

        <div class="glass p-4 rounded-lg group">
