<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTL.IQ | Essentials</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'TwinAngel';
            src: url('twinangel.ttf') format('truetype');
            font-display: swap;
        }
        body { font-family: sans-serif; background-color: #050505; color: #ffffff; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .brand-font { font-family: 'TwinAngel', sans-serif; }
        .text-gradient {
            background: linear-gradient(to bottom, #ffffff 60%, #444444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="selection:bg-white selection:text-black">

    <nav class="fixed top-0 w-full z-50 glass py-5 px-8 flex justify-between items-center transition-all">
        <div class="text-xl font-bold tracking-tighter">ESTL<span class="text-gray-600">.IQ</span></div>
        <div class="hidden md:flex gap-10 text-[10px] uppercase tracking-[0.3em] font-light">
            <a href="#products" class="hover:text-gray-400">Shop</a>
            <a href="#" class="hover:text-gray-400">Archive</a>
            <a href="#" class="hover:text-gray-400">Contact</a>
        </div>
        <div class="text-[10px] tracking-widest font-bold">BAG (0)</div>
    </nav>

    <div class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50 w-[90%] glass rounded-2xl py-4 px-8 flex justify-around items-center text-[10px] uppercase tracking-[0.2em] border border-white/10 shadow-2xl">
        <a href="#products" class="text-white">Shop</a>
        <div class="w-[1px] h-3 bg-white/20"></div>
        <a href="#" class="text-gray-400">Story</a>
        <div class="w-[1px] h-3 bg-white/20"></div>
        <a href="#" class="text-gray-400">Contact</a>
    </div>

    <section class="h-screen flex flex-col justify-center items-center text-center relative overflow-hidden">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-zinc-800/20 via-black to-black -z-10"></div>
        <h1 class="brand-font text-8xl md:text-[14rem] text-gradient leading-none">ESTL</h1>
        <p class="text-gray-500 text-[10px] md:text-xs tracking-[0.5em] uppercase mt-6">Essential Pieces for Daily Life</p>
        <a href="#products" class="mt-12 px-10 py-3 bg-white text-black text-[10px] font-bold uppercase tracking-widest hover:invert transition-all duration-500">Shop Collection</a>
    </section>

    <section id="products" class="max-w-6xl mx-auto py-32 px-6 grid grid-cols-1 md:grid-cols-3 gap-12">
        <div class="group">
            <div class="aspect-[3/4] bg-zinc-900 mb-6 flex items-center justify-center text-[10px] uppercase tracking-tighter text-zinc-700 border border-white/5 group-hover:border-white/20 transition-all">Loading Image...</div>
            <div class="flex justify-between text-[11px] uppercase tracking-widest">
                <span>Heavy Tee</span>
                <span class="text-gray-500 font-light">25,000 IQD</span>
            </div>
        </div>
        <div class="group">
            <div class="aspect-[3/4] bg-zinc-900 mb-6 flex items-center justify-center text-[10px] uppercase text-zinc-700 border border-white/5 transition-all">Loading Image...</div>
            <div class="flex justify-between text-[11px] uppercase tracking-widest">
                <span>Signature Hoodie</span>
                <span class="text-gray-500 font-light">45,000 IQD</span>
            </div>
        </div>
        <div class="group">
            <div class="aspect-[3/4] bg-zinc-900 mb-6 flex items-center justify-center text-[10px] uppercase text-zinc-700 border border-white/5 transition-all">Loading Image...</div>
            <div class="flex justify-between text-[11px] uppercase tracking-widest">
                <span>Core Sweatpants</span>
                <span class="text-gray-500 font-light">35,000 IQD</span>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center text-[9px] text-gray-700 tracking-[0.4em] uppercase">
        ESTL.IQ &copy; 2026 Crafted for the Essentials
    </footer>

</body>
</html>
